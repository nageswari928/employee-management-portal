<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Login</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/login.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" data-testid="login-card"aria-labelledby="login-title">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">EP</div>
          <div>
            <p class="eyebrow">Northstar Holdings</p>
            <h1 id="login-title">Employee Management Portal</h1>
          </div>
        </div>

        <form id="loginForm" class="login-form" data-testid="login-form"novalidate>
          <label class="field-label" for="employeeId">Employee ID</label>
          <input id="employeeId" name="employeeId" type="text" data-testid="employee-id" autocomplete="username" required />

          <label class="field-label" for="password">Password</label>
          <div class="password-wrap" data-testid="password-wrapper">
            <input id="password" name="password" type="password" data-testid="password" autocomplete="current-password" required />
            <button id="togglePassword" class="ghost-btn" type="button" data-testid="toggle-password">Show</button>
          </div>

          <div class="form-row">
            <label class="checkbox-row" for="rememberMe">
              <input id="rememberMe" name="rememberMe" type="checkbox" data-testid="remember-me" />
              <span>Remember me</span>
            </label>
            <a href="forgot-password.html"class="text-link" data-testid="forgot-password">Forgot password?</a>
          </div>

          <div id="loginMessage" class="form-message" data-testid="login-message" role="alert" aria-live="polite"></div>

          <div class="actions-row">
            <button id="loginBtn" type="submit" class="btn primary" data-testid="login-btn">Login</button>
            <button id="resetBtn" type="reset" class="btn secondary" data-testid="reset-btn">Reset</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
