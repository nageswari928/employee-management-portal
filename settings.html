<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/settings.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Configuration</p>
            <h1>Settings</h1>
          </div>
          <div class="topbar-actions">
            <a href="./notifications.html" class="icon-link" data-testid="notification-btn" aria-label="Notifications">🔔</a>
            <button id="logoutBtn" class="btn secondary" data-testid="logout-btn" type="button">Logout</button>
          </div>
        </header>
        <main class="content">
          <section class="panel settings-panel">
            <h2>Preferences</h2>
            <form id="settingsForm" class="settings-form" novalidate>
              <div class="setting-card">
                <label for="themeToggle" class="setting-row">
                  <span>Theme</span>
                  <select id="themeToggle" data-testid="theme-toggle">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                  </select>
                </label>
                <label for="languageSelect" class="setting-row">
                  <span>Language</span>
                  <select id="languageSelect" data-testid="language-select">
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                  </select>
                </label>
                <label for="notificationToggle" class="setting-row">
                  <span>Notifications</span>
                  <input id="notificationToggle" type="checkbox" data-testid="notification-toggle" />
                </label>
                <label for="autoLogoutToggle" class="setting-row">
                  <span>Auto Logout</span>
                  <input id="autoLogoutToggle" type="checkbox" data-testid="auto-logout-toggle" />
                </label>
              </div>
              <div class="setting-card">
                <h3>Change Password</h3>
                <label class="field" for="currentPassword">Current Password<input id="currentPassword" name="currentPassword" type="password" data-testid="current-password" /></label>
                <label class="field" for="newPassword">New Password<input id="newPassword" name="newPassword" type="password" data-testid="new-password" /></label>
                <label class="field" for="confirmPassword">Confirm Password<input id="confirmPassword" name="confirmPassword" type="password" data-testid="confirm-password" /></label>
              </div>
              <div class="actions-row">
                <button id="saveSettingsBtn" class="btn primary" data-testid="save-settings-btn" type="submit">Save Settings</button>
                <button id="resetSettingsBtn" class="btn secondary" data-testid="reset-settings-btn" type="button">Reset Settings</button>
              </div>
              <div id="settingsMessage" class="form-message" role="alert" aria-live="polite"></div>
            </form>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./js/settings.js"></script>
  </body>
</html>
