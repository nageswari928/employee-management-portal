<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/profile.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Personal Workspace</p>
            <h1>My Profile</h1>
          </div>
          <div class="topbar-actions">
            <a href="./notifications.html" class="icon-link" data-testid="notification-btn" aria-label="Notifications">🔔</a>
            <button id="logoutBtn" class="btn secondary" data-testid="logout-btn" type="button">Logout</button>
          </div>
        </header>
        <main class="content">
          <section class="panel profile-panel">
            <div class="profile-header">
              <div class="avatar-large" id="profileAvatar">JD</div>
              <div>
                <h2 id="profileName">Jane Doe</h2>
                <p id="profileRole">Senior Business Analyst</p>
              </div>
              <div class="profile-actions">
                <button id="editProfileBtn" class="btn primary" data-testid="edit-profile-btn" type="button">Edit Profile</button>
                <button id="saveProfileBtn" class="btn primary hidden" data-testid="save-profile-btn" type="button">Save</button>
                <button id="cancelProfileBtn" class="btn secondary hidden" data-testid="cancel-profile-btn" type="button">Cancel</button>
              </div>
            </div>
            <form id="profileForm" class="profile-form" novalidate>
              <div class="form-grid">
                <label class="field">Name<input id="profileNameInput" name="name" type="text" data-testid="profile-name" /></label>
                <label class="field">Email<input id="profileEmailInput" name="email" type="email" data-testid="profile-email" /></label>
                <label class="field">Phone<input id="profilePhoneInput" name="phone" type="tel" data-testid="profile-phone" /></label>
                <label class="field">Department<input id="profileDepartmentInput" name="department" type="text" data-testid="profile-department" /></label>
                <label class="field">Role<input id="profileRoleInput" name="role" type="text" data-testid="profile-role" /></label>
                <label class="field">Joining Date<input id="profileDateInput" name="joiningDate" type="date" data-testid="profile-joining-date" /></label>
                <label class="field full">Address<textarea id="profileAddressInput" name="address" data-testid="profile-address"></textarea></label>
                <label class="field full">Skills<textarea id="profileSkillsInput" name="skills" data-testid="profile-skills"></textarea></label>
              </div>
              <div id="profileMessage" class="form-message" role="alert" aria-live="polite"></div>
            </form>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./js/profile.js"></script>
  </body>
</html>
