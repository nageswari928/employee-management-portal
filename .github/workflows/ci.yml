name: Portal CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Portal
        uses: actions/checkout@v4

      - name: Checkout Playwright Repository
        uses: actions/checkout@v4
        with:
          repository: nageswari928/employee-management-playwright
          path: playwright

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright Dependencies
        working-directory: playwright
        run: npm install

      - name: Install Browsers
        working-directory: playwright
        run: npx playwright install --with-deps

      - name: Start Local Server
        run: |
          python3 -m http.server 8000 &
          sleep 5

      - name: Run Playwright Tests
        working-directory: playwright
        env:
          BASE_URL: http://localhost:8000
        run: npx playwright test

      - name: Check Threshold
        working-directory: playwright
        run: node scripts/check-threshold.js
  
      - name: Build Passed
        run: echo "Threshold satisfied. Build Allowed."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Website
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Website
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright/playwright-report
            playwright/test-results
  analyzer:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Portal Repository
        uses: actions/checkout@v4
        with:
          path: employee-management-portal

      - name: Checkout Repository Analyzer
        uses: actions/checkout@v4
        with:
          repository: nageswari928/repository-analyzer
          path: repository-analyzer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: repository-analyzer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Repository Analyzer
        working-directory: repository-analyzer
        run: |
          python analyzer/main.py \
            --repo-path ../employee-management-portal

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: repository-analysis-report
          path: repository-analyzer/reports/tech-stack.json