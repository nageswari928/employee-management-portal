name: Portal CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Checkout Portal
        uses: actions/checkout@v4

      - name: Checkout Playwright Repository
        uses: actions/checkout@v4
        with:
          repository: nageswari928/employee-management-playwright
          path: playwright

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Portal Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Portal App
        run: npm run build

      - name: Install Playwright Dependencies
        working-directory: playwright
        run: npm install

      - name: Install Browsers
        working-directory: playwright
        run: npx playwright install --with-deps

      - name: Start Local Server
        run: |
          npm run preview -- --port 8000 &
          sleep 5

      - name: Run Playwright Tests
        working-directory: playwright
        env:
          BASE_URL: http://localhost:8000
        run: npx playwright test

      - name: Check Threshold
        working-directory: playwright
        run: node scripts/check-threshold.js
  
      - name: Build Passed
        run: echo "Threshold satisfied. Build Allowed."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Website
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Website
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright/playwright-report
            playwright/test-results

      - name: Generate Code Coverage Reports
        if: always()
        working-directory: playwright
        run: |
          npx nyc report --cwd ../ --temp-dir .nyc_output --reporter=html --reporter=text --report-dir coverage
          node scripts/generate-per-test-coverage.js

      - name: Upload Code Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: playwright/coverage
  analyzer:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Portal Repository
        uses: actions/checkout@v4
        with:
          path: employee-management-portal

      - name: Checkout Repository Analyzer
        uses: actions/checkout@v4
        with:
          repository: nageswari928/repository-analyzer
          path: repository-analyzer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: repository-analyzer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Repository Analyzer
        working-directory: repository-analyzer
        env:
          PYTHONPATH: ${{ github.workspace }}/repository-analyzer
        run: |
          python -m analyzer.main --repo-path ../employee-management-portal --json-out reports/tech-stack.json

      

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: repository-analysis-report
          path: repository-analyzer/reports/tech-stack.json