name: Portal CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  statuses: write

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Checkout Portal
        uses: actions/checkout@v4

      - name: Checkout Playwright Repository
        uses: actions/checkout@v4
        with:
          repository: nageswari928/employee-management-playwright
          path: playwright

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Portal Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Portal App
        env:
          VITE_COVERAGE: "true"
        run: npm run build

      - name: Install Playwright Dependencies
        working-directory: playwright
        run: npm install

      - name: Install Browsers
        working-directory: playwright
        run: npx playwright install --with-deps

      - name: Start Local Server
        run: |
          npm run preview -- --port 8000 &
          sleep 5

      - name: Run Playwright Tests
        working-directory: playwright
        env:
          BASE_URL: http://localhost:8000
        run: npx playwright test

      - name: Check Threshold
        working-directory: playwright
        run: node scripts/check-threshold.js
  
      - name: Build Passed
        run: echo "Threshold satisfied. Build Allowed."

      - name: Download Previous Allure History
        if: always()
        run: |
          mkdir -p playwright/allure-results/history
          curl -f -s -o playwright/allure-results/history/history.json https://nageswari928.github.io/employee-management-portal/allure-report/history/history.json || true
          curl -f -s -o playwright/allure-results/history/history-trend.json https://nageswari928.github.io/employee-management-portal/allure-report/history/history-trend.json || true
          curl -f -s -o playwright/allure-results/history/categories-trend.json https://nageswari928.github.io/employee-management-portal/allure-report/history/categories-trend.json || true
          curl -f -s -o playwright/allure-results/history/duration-trend.json https://nageswari928.github.io/employee-management-portal/allure-report/history/duration-trend.json || true
          curl -f -s -o playwright/allure-results/history/retry-trend.json https://nageswari928.github.io/employee-management-portal/allure-report/history/retry-trend.json || true

      - name: Generate Allure Report
        if: always()
        working-directory: playwright
        run: npm run allure:generate

      - name: Copy Allure Report to Build Output
        run: cp -r playwright/allure-report dist/allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Website
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Website
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright/playwright-report
            playwright/test-results

      - name: Generate Code Coverage Reports
        if: always()
        working-directory: playwright
        run: |
          npx nyc report --cwd ${{ github.workspace }} --temp-dir ${{ github.workspace }}/playwright/.nyc_output --reporter=html --reporter=text --report-dir ${{ github.workspace }}/playwright/coverage
          node scripts/generate-per-test-coverage.js

      - name: Upload Code Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: playwright/coverage

      - name: Publish Visual Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright E2E Tests
          path: playwright/test-results/junit.xml
          reporter: java-junit


      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwright/allure-report

      - name: Install PyMongo
        if: always()
        run: pip install pymongo

      - name: Upload Test Results to MongoDB
        if: always()
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python playwright/scripts/upload_test_results.py

      - name: Upload Build Metadata to MongoDB
        if: always()
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scripts/log_build_metadata.py
  analyzer:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Portal Repository
        uses: actions/checkout@v4
        with:
          path: employee-management-portal

      - name: Checkout Repository Analyzer
        uses: actions/checkout@v4
        with:
          repository: nageswari928/repository-analyzer
          path: repository-analyzer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: repository-analyzer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Repository Analyzer
        working-directory: repository-analyzer
        env:
          PYTHONPATH: ${{ github.workspace }}/repository-analyzer
        run: |
          python -m analyzer.main --repo-path ../employee-management-portal --json-out reports/tech-stack.json

      

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: repository-analysis-report
          path: repository-analyzer/reports/tech-stack.json