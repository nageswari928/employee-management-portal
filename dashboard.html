<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Operations Center</p>
            <h1 data-testid="dashboard">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <a href="./notifications.html" class="icon-link" data-testid="notification-btn" aria-label="Notifications">🔔</a>
            <button id="logoutBtn" class="btn secondary" data-testid="logout-btn" type="button">Logout</button>
          </div>
        </header>
        <main class="content" id="dashboardContent"></main>
      </div>
    </div>

    <div class="modal" id="logoutModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="logoutTitle">
        <h3 id="logoutTitle">Confirm Logout</h3>
        <p>Are you sure you want to leave the portal?</p>
        <div class="actions-row">
          <button id="confirmLogoutBtn" class="btn primary" data-testid="confirm-logout" type="button">Yes</button>
          <button id="cancelLogoutBtn" class="btn secondary" data-testid="cancel-logout" type="button">No</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
